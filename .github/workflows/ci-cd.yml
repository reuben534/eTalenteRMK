name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
          uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Run backend tests
      run: cd backend && mvn clean test
    
    - name: Build backend
      run: cd backend && mvn clean package -DskipTests

    - name: Upload backend artifact
          uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/*.jar

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
          uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: cd frontend && npm ci
    
    - name: Build frontend (type-check + build)
      run: cd frontend && npm run build

    - name: Upload frontend artifact
          uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/**

  docker-build:
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker images
      run: docker compose build
    
    - name: Test Docker services startup
      run: |
        docker compose up -d
        sleep 10
        docker compose ps
        docker compose down

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Run backend linter (checkstyle) if configured
      run: |
        if grep -q "maven-checkstyle-plugin" backend/pom.xml; then
          cd backend && mvn checkstyle:check;
        else
          echo "Checkstyle plugin not configured; skipping";
        fi
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install frontend dependencies
      run: cd frontend && npm ci
    
    - name: Run ESLint if script exists
      run: |
        cd frontend
        if npm run | grep -q "lint"; then
          npm run lint
        else
          echo "No lint script found; skipping";
        fi
